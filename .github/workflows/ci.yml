name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    # Windows runner: window_capture imports pywin32 at module load, so the suite
    # can't even import on Linux. Matches the only supported platform (Win 10/11).
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen # PyQt6 widget tests run headless
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check

      - name: Format (ruff)
        run: ruff format --check

      - name: Type-check (mypy)
        run: mypy

      - name: Tests (pytest)
        run: pytest -q
